<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlowBalance | Settings</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/darkmode.css" />
</head>
<body>

  <!-- TOP NAVBAR -->
  <nav class="top-nav card">
    <div class="nav-left">
      <a href="index.html" class="brand">Flow<span>Balance</span></a>
      <ul class="nav-links">
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="projects.html">Projects</a></li>
        <li><a href="tasks.html">Tasks</a></li>
        <li><a href="finance.html">Finance</a></li>
        <li><a href="settings.html" class="active">Settings</a></li>
      </ul>
    </div>
    <div class="nav-right">
      <div id="quoteCompact" class="quote-compact"></div>
      <button id="profileBtn" class="secondary-btn">Hi, <span id="navUser">You</span></button>
    </div>
  </nav>

  <!-- PAGE LAYOUT -->
  <div class="page-grid">

    <!-- SIDEBAR -->
    <aside class="sidebar card">
      <h3>Quick Links</h3>
      <ul>
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="projects.html">Projects</a></li>
        <li><a href="tasks.html">Tasks</a></li>
        <li><a href="finance.html">Finance</a></li>
        <li><a href="settings.html">Settings</a></li>
      </ul>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">

      <header class="section-header">
        <div>
          <h2>Settings</h2>
          <p class="muted">Customise your FlowBalance experience</p>
        </div>
      </header>

      <section class="settings-grid">
        <div class="card form-card">
          <h3>Profile</h3>
          <label>
            Your Name
            <input type="text" id="usernameInput" placeholder="Enter your name" />
          </label>
          <button id="saveNameBtn" class="primary-btn">Save Name</button>
        </div>

        <div class="card form-card">
          <h3>Appearance</h3>
          <label class="toggle-label">
            Dark Mode
            <input type="checkbox" id="themeToggle" />
          </label>
        </div>

        <div class="card form-card">
          <h3>Data Control</h3>
          <button id="clearDataBtn" class="danger-btn">Reset All Data</button>
        </div>
      </section>

    </main>
  </div>

  <footer class="card footer">
    <p>© 2025 FlowBalance — Settings Module</p>
  </footer>

  <script src="js/api.js"></script>
  <script src="js/storage.js"></script>
</body>
</html>
